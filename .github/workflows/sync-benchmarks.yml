name: Sync Benchmarks

on:
  repository_dispatch:
    types:
      - benchmarks-updated
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-benchmarks
  cancel-in-progress: false

jobs:
  sync:
    name: Publish latest benchmark data
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.client_payload.repository == 'Browso/benchmarks'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out website
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check out benchmark data
        uses: actions/checkout@v4
        with:
          repository: Browso/benchmarks
          ref: main
          path: benchmark-data
          persist-credentials: false

      - name: Copy latest benchmark result
        shell: bash
        run: |
          test -s benchmark-data/results/latest.json
          jq empty benchmark-data/results/latest.json
          mkdir -p assets/data
          cp benchmark-data/results/latest.json assets/data/benchmarks.json

      - name: Commit website data
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/benchmarks.json

          if git diff --cached --quiet; then
            echo "Website already contains the latest benchmark data."
            exit 0
          fi

          git commit -m "Update Browso benchmark data"
          git pull --rebase origin main
          git push origin HEAD:main
