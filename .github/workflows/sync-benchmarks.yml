name: Publish Benchmarks

on:
  repository_dispatch:
    types:
      - browso-benchmarks-updated

permissions:
  contents: write

concurrency:
  group: publish-benchmarks
  cancel-in-progress: false

jobs:
  publish:
    name: Update benchmark history
    if: github.event.client_payload.repository == 'browso/browso'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out website
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate and merge benchmark result
        env:
          BENCHMARK_JSON: ${{ toJson(github.event.client_payload.benchmark) }}
        shell: bash
        run: |
          mkdir -p assets/data
          printf '%s\n' "$BENCHMARK_JSON" > "$RUNNER_TEMP/incoming-benchmark.json"

          jq -e '
            .schemaVersion == 2 and
            ((.source.repository | ascii_downcase) == "browso/browso") and
            (.source.commit | type == "string") and
            (.generatedAt | type == "string") and
            (.metrics.productionBuild.median | type == "number")
          ' "$RUNNER_TEMP/incoming-benchmark.json" > /dev/null

          if [ ! -f assets/data/benchmarks.json ]; then
            printf '%s\n' '{"schemaVersion":1,"updatedAt":null,"runs":[]}' \
              > assets/data/benchmarks.json
          fi

          jq -e '
            .schemaVersion == 1 and
            (.runs | type == "array")
          ' assets/data/benchmarks.json > /dev/null

          jq \
            --slurpfile incoming "$RUNNER_TEMP/incoming-benchmark.json" \
            '
              .schemaVersion = 1 |
              .updatedAt = $incoming[0].generatedAt |
              .runs = (
                [$incoming[0]] + [
                  .runs[] |
                  select(.source.commit != $incoming[0].source.commit)
                ] |
                sort_by(.generatedAt) |
                reverse |
                .[:30]
              )
            ' assets/data/benchmarks.json > "$RUNNER_TEMP/benchmarks.json"

          mv "$RUNNER_TEMP/benchmarks.json" assets/data/benchmarks.json

      - name: Commit benchmark data
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/benchmarks.json

          if git diff --cached --quiet; then
            echo "This benchmark commit is already published."
            exit 0
          fi

          version="$(jq -r '.runs[0].source.version' assets/data/benchmarks.json)"
          commit="$(jq -r '.runs[0].source.commit[0:7]' assets/data/benchmarks.json)"
          git commit -m "Update benchmarks for v${version} (${commit})"
          git pull --rebase origin main
          git push origin HEAD:main
