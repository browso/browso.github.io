name: Publish Markdown Content

on:
  push:
    branches:
      - main
    paths:
      - "content/**/*.md"
      - "scripts/build-content.mjs"
      - ".github/workflows/publish-content.yml"
  pull_request:
    paths:
      - "content/**/*.md"
      - "scripts/build-content.mjs"
      - ".github/workflows/publish-content.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-site-content-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build blog and documentation
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out website
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate static content
        run: node scripts/build-content.mjs

      - name: Validate generated pages
        run: |
          test -f blog/index.html
          test -f docs/index.html
          test -s sitemap.xml
          ! grep -R '{{' blog docs

      - name: Commit generated website
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blog docs sitemap.xml

          if git diff --cached --quiet; then
            echo "Generated content is already current."
            exit 0
          fi

          git commit -m "Publish blog and documentation"
          git pull --rebase origin main
          git push origin HEAD:main
